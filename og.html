  html, body { width: 1200px; height: 630px; overflow: hidden; }
  :root {
    --cream: #FFFCE8;
    --ink: #000000;
    --sage: #CC5033;
    --sage-light: #E8A090;
    --serif: Georgia, 'Times New Roman', serif;
    --sans: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    font-family: var(--sans);
    background: #000;
    color: var(--cream);
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('cover.jpg');
    background-size: cover;
    background-position: center 30%;
    filter: saturate(0.85);
  }
  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.65) 50%, rgba(0,0,0,0.9) 100%);
  }
  .content {
    position: absolute;
    inset: 0;
    padding: 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 1;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,252,232,0.75);
  }
  .top svg { flex-shrink: 0; }
  .top .sep { opacity: 0.4; }
  .top .client { color: var(--cream); letter-spacing: 0.16em; }
  .headline {
    font-family: var(--serif);
    font-size: 88px;
    line-height: 1.04;
    letter-spacing: -0.02em;
    font-weight: 400;
    color: var(--cream);
    max-width: 900px;
  }
  .headline em {
    font-style: italic;
    color: var(--sage-light);
  }
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: var(--sans);
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,252,232,0.6);
  }
  .bottom .right { text-align: right; }
  .accent-bar {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 150px;
    height: 1px;
    background: rgba(255,252,232,0.2);
    z-index: 1;
  }
</style>
